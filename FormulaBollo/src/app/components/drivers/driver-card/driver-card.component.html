<div
	class="group overflow-hidden rounded-lg border-t-8 border-b-0 shadow-lg hover:shadow-xl transition-shadow cursor-pointer transition-all duration-500 hover:bg-slate-500"
	[class]="'border-' + (driverShow.driver.team.name | SpaceToUnderscore)"
	(click)="router.navigate(['/drivers/' + utilsService.spaceToUnderScore(driverShow.driver.name)])"
	(keydown.enter)="router.navigate(['/drivers/' + utilsService.spaceToUnderScore(driverShow.driver.name)])">
	<div class="flex flex-col h-full">
		<div class="flex items-center p-3 xs:p-4 bg-white dark:bg-gray-900">
			<div
				class="w-10 h-10 font-bold text-slate-700 dark:text-white mr-2 xs:mr-4 rounded-full flex justify-center items-center shadow"
				[class]="'bg-' + (driverShow.driver.team.name | SpaceToUnderscore)">
				{{ index + 1 }}
			</div>
			<div class="flex-1">
				<div class="flex items-center">
					<h3 class="font-bold text-slate-800 dark:text-white">{{ driverShow.driver.name }}</h3>
					<i
						style="font-size: 0.55rem"
						class="pi mt-1 ml-2"
						[ngClass]="{
							'pi-arrow-up text-green-500': driverShow.positionChange === 'ADVANCED',
							'pi-arrow-down text-red-500': driverShow.positionChange === 'DROPPED'
						}"></i>
					<p
						class="text-xs mt-1 ml-0.5"
						[ngClass]="{
							'text-green-500': driverShow.positionChange === 'ADVANCED',
							'text-red-500': driverShow.positionChange === 'DROPPED'
						}">
						{{ driverShow.positionChangeAmount != 0 ? driverShow.positionChangeAmount : undefined }}
					</p>
				</div>
				<div class="flex items-center">
					<div class="h-1.5 w-1.5 mr-1 rounded-full" [class]="'bg-' + (driverShow.driver.team.name | SpaceToUnderscore)"></div>
					<p class="text-xs text-slate-500 dark:text-slate-300">{{ driverShow.driver.team.name }}</p>
				</div>
			</div>
			<div class="flex flex-col items-end">
				<div class="font-bold text-slate-800 dark:text-white">{{ driverShow.totalPoints }}</div>
				<div class="text-xs text-slate-500 dark:text-slate-300">PTS</div>
			</div>
		</div>
		<div
			class="relative flex-1 bg-slate-200 group-hover:bg-slate-300 dark:bg-slate-600 group-hover:dark:bg-slate-500 transition-all duration-300 pt-4 flex items-end justify-between">
			<p
				class="absolute bottom-0 right-0 mr-1 text-6xl font-bold opacity-40 text-slate-400 dark:text-slate-500 group-hover:opacity-100"
				[class]="'color-' + (driverShow.driver.team.name | SpaceToUnderscore)">
				{{ driverShow.driver.number }}
			</p>
			<div class="w-full h-48 flex justify-center">
				<img
					[src]="imageService.getImageUrl(driverShow.driver.driverImage | SpaceToUnderscore)"
					[alt]="driverShow.driver.name"
					class="h-full object-cover object-center" />
			</div>
		</div>
	</div>
</div>
