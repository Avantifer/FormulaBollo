<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mx-2 md:mx-0 xl:mx-16">
  @for (driverPoint of displayTop3; track $index) {
    <div 
      class="w-full flex-col items-center justify-end"
      [class]="$index != 1 ? 'hidden md:flex' : 'flex'"
    >
      <div class="relative mb-4">
        <div 
          class="absolute left-1/2 transform -translate-x-1/2"
          [class]="$index != 1 ? '-top-11' : '-top-15'"
          >
          @if ($index !== 1) {
            <svg  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-10" [class]="$index === 0 ? 'text-gray-300' : 'text-amber-700'">
              <path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"></path>
              <path d="M11 12 5.12 2.2"></path>
              <path d="m13 12 5.88-9.8"></path>
              <path d="M8 7h8"></path>
              <circle cx="12" cy="17" r="5"></circle>
            </svg>              
          } @else{
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-14 text-amber-400">
              <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
              <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
              <path d="M4 22h16"></path>
              <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
              <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
              <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
            </svg>
          }
        </div>
        <div 
          class="rounded-full overflow-hidden border-4 shadow-xl dark:shadow-gray-800/50"
          [ngClass]="{
            'size-36': $index !== 1,
            'size-44': $index === 1,
            'border-gray-300 bg-gray-400/20': $index === 0,
            'border-amber-400 bg-amber-500/20': $index === 1,
            'border-amber-700 bg-amber-800/20': $index === 2
          }"
        >
          <img 
            [alt]="driverPoint.driver.name" 
            class="h-full w-full object-cover" 
            [src]="imageService.getImageUrl(driverPoint.driver.driverImage)"
          >
        </div>
      </div>
      <div class="w-full shadow-xl dark:shadow-gray-800/50 rounded-xl">
        <div class="bg-gray-200 dark:bg-gray-800/70 w-full py-4 px-2 rounded-t-xl text-center">
          <p 
            class="inline-flex items-center justify-center text-lg font-bold h-8 w-8 rounded-full mb-2"
            [class]="'bg-' + (driverPoint.driver.team.name | SpaceToUnderscore)"
          >
            {{ driverPoint.driver.number}}
          </p>
          <h3 class="text-xl font-bold">{{ driverPoint.driver.name }}</h3>
          <p 
            class="font-bold"
            [class]="'color-' + (driverPoint.driver.team.name | SpaceToUnderscore)"
          >
            {{ driverPoint.driver.team.name }}
          </p>
          <div 
            class="mt-2 h-8 rounded-lg relative font-bold"
            [ngClass]="{
              'bg-gray-400/20': $index === 0,
              'bg-amber-500/20': $index === 1,
              'bg-amber-800/20': $index === 2
            }"
          >
          <div 
            class="text-white absolute w-8 h-full rounded-l-lg flex items-center justify-center"
            [ngClass]="{
              'bg-gray-400': $index === 0,
              'bg-amber-500': $index === 1,
              'bg-amber-800': $index === 2
            }"
          >
            {{ utilsService.getCustomPosition($index) }}º
          </div>
            <p class="h-full content-center"
              [ngClass]="{
                'text-gray-500  dark:text-gray-300': $index === 0,
                'text-amber-500 dark:text-amber-400': $index === 1,
                'text-amber-700': $index === 2
              }"
            >
            {{ driverPoint.totalPoints }} puntos
            </p>
          </div>
        </div>
        <div class="bg-gray-300 dark:bg-gray-700 h-4 w-full"></div>
        <div 
          class="bg-gray-400/60 dark:bg-gray-600 w-full rounded-b-xl flex items-end justify-center pb-2"
          [ngClass]="{
            'h-16': $index === 0,
            'h-24': $index === 1,
            'h-10': $index === 2
          }"
        >
        </div>
      </div>
    </div>
  }
</div>
