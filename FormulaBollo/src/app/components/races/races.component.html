<div class="bg-slate-100 dark:bg-slate-800">
	<main class="flex-1 bg-slate-100 dark:bg-slate-800">
		<div class="my-container mx-auto px-2 py-8">
			<div class="mb-6 flex flex-row justify-between items-center p-4 rounded-lg bg-white dark:bg-slate-700 shadow-sm">
				<div class="flex items-center gap-2">
					<h1 class="text-xl font-bold">Resultados</h1>
				</div>
				<div class="flex flex-wrap items-center gap-4">
					<select-seasons (seasonChanged)="onSeasonChange($event)"></select-seasons>
				</div>
			</div>
			<div class="carousel relative">
				<div class="h-12 flex justify-between items-center mb-4">
					<h2 class="text-base xs:text-xl font-bold">Calendario de Carreras</h2>
				</div>
				@if (races().length) {
					<p-carousel [value]="races()" [numVisible]="5" [numScroll]="5" [responsiveOptions]="responsiveOptionsCarousel">
						<ng-template let-race #item>
							<div
								class="rounded-lg h-60 w-full sm:size-57 lg:size-74 overflow-hidden bg-white hover:bg-gray-300 dark:bg-slate-700 dark:hover:bg-slate-600 transition-all duration-300 shadow-md hover:shadow-lg relative group cursor-pointer">
								<div class="relative h-35 lg:h-46 overflow-hidden">
									<img
										[alt]="race.name"
										loading="lazy"
										class="object-cover transition-transform duration-500 group-hover:scale-110 absolute size-full inset-0"
										[src]="imageService.getImageUrl(race.circuitImage)" />
									<div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
									<div class="absolute bottom-0 left-0 right-0 p-4">
										<div class="flex items-center">
											<span class="text-white text-lg font-bold mr-2">{{ race.name }}</span>
										</div>
									</div>
								</div>

								<div class="p-2 lg:p-4">
									<div class="flex items-center mb-3">
										<i class="pi pi-calendar text-gray-600 dark:text-gray-300 mr-1" style="font-size: 14px"></i>
										<span class="text-sm text-gray-600 dark:text-gray-300">{{ race.dateStart | date: 'dd/MM/yyyy' }}</span>
									</div>
									<p-button
										label="Ver resultados"
										icon="pi pi-angle-right"
										class="buttonRace text-sm rounded-md w-full text-white cursor-pointer"
										iconPos="right"
										[routerLink]="['/results/' + (race.name | SpaceToUnderscore) + '/' + race.season.number]" />
								</div>
								<div class="absolute top-2 right-2 px-2 py-1 text-xs rounded-full bg-green-900/70 text-green-400" *ngIf="race.finished">
									Completada
								</div>
							</div>
						</ng-template>
					</p-carousel>
				} @else {
					<div class="p-2 md:p-6">
						<p-skeleton width="100%" height="17rem"></p-skeleton>
					</div>
				}
			</div>
			<div class="rounded-lg shadow-lg mt-8 bg-white dark:bg-slate-700">
				<div class="p-6">
					@if (races().length) {
						<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
							@for (race of races(); track $index) {
								<div
									class="flex items-center p-3 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-600 dark:hover:bg-slate-500 transition-colors cursor-pointer"
									[routerLink]="['/results/' + (race.name | SpaceToUnderscore) + '/' + race.season.number]">
									<div class="mr-3 size-12 rounded-full overflow-hidden relative">
										<img
											[alt]="race.name"
											loading="lazy"
											class="object-cover absolute size-full"
											[src]="imageService.getImageUrl(race.flagImage)" />
									</div>
									<div class="flex-grow">
										<div class="flex items-center">
											<span class="font-medium">{{ race.name }}</span>
										</div>
										<div class="flex items-center mb-3">
											<i class="pi pi-calendar text-gray-600 dark:text-gray-300 mr-1" style="font-size: 14px"></i>
											<span class="text-sm text-gray-600 dark:text-gray-300">{{ race.dateStart | date: 'dd/MM/yyyy' }}</span>
										</div>
									</div>
									<i class="pi pi-chevron-right ml-1 pt-0.5"></i>
								</div>
							}
						</div>
					} @else {
						<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
							<div *ngFor="let item of 12 | skeletonItems" class="mb-6">
								<p-skeleton width="95%" height="5rem"></p-skeleton>
							</div>
						</div>
					}
				</div>
			</div>
		</div>
	</main>
</div>
